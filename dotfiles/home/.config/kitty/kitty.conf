# =============================================================================
# kitty — andusystems ricing
# Kanagawa Wave palette, surimi orange accent (#ff9e3b).
# =============================================================================

# -----------------------------------------------------------------------------
# Font
# -----------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        10.0

disable_ligatures never
modify_font cell_height 87%

# -----------------------------------------------------------------------------
# Cursor
# -----------------------------------------------------------------------------
cursor_shape            block
cursor_shape_unfocused  block
cursor_blink_interval   0
cursor_trail            0

# -----------------------------------------------------------------------------
# Scrollback
# -----------------------------------------------------------------------------
scrollback_lines                10000
scrollback_pager_history_size   100

# -----------------------------------------------------------------------------
# Mouse / URLs
# -----------------------------------------------------------------------------
url_color    #ff9e3b
url_style    single
detect_urls  yes
copy_on_select yes
strip_trailing_spaces smart

# -----------------------------------------------------------------------------
# Bell
# -----------------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

# -----------------------------------------------------------------------------
# Window
# -----------------------------------------------------------------------------
remember_window_size       yes
initial_window_width       1200
initial_window_height      760
window_padding_width       10 2 2 10
window_margin_width        0
hide_window_decorations    yes
confirm_os_window_close    0
background_opacity         0.90
dynamic_background_opacity yes
background_blur            24

# -----------------------------------------------------------------------------
# Tabs (mostly hidden — tmux handles multiplexing)
# -----------------------------------------------------------------------------
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_min_tabs    2
tab_title_template  "{index}: {title}"
active_tab_foreground   #141418
active_tab_background   #ff9e3b
active_tab_font_style   bold
inactive_tab_foreground #727169
inactive_tab_background #2a2a37
inactive_tab_font_style normal

# -----------------------------------------------------------------------------
# Color palette — Kanagawa Wave
# -----------------------------------------------------------------------------
foreground        #dcd7ba
background        #141418
selection_foreground #dcd7ba
selection_background #2d4f67

# black
color0  #090618
color8  #727169
# red
color1  #c34043
color9  #e82424
# green
color2  #76946a
color10 #98bb6c
# yellow
color3  #c0a36e
color11 #e6c384
# blue
color4  #7e9cd8
color12 #7fb4ca
# magenta
color5  #957fb8
color13 #938aa9
# cyan
color6  #6a9589
color14 #7aa89f
# white
color7  #c8c093
color15 #dcd7ba

# -----------------------------------------------------------------------------
# Performance
# -----------------------------------------------------------------------------
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# -----------------------------------------------------------------------------
# Shell integration
# -----------------------------------------------------------------------------
shell_integration enabled no-sudo

# -----------------------------------------------------------------------------
# Keybinds
# -----------------------------------------------------------------------------
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard
map ctrl+shift+f  show_scrollback
map ctrl+shift+enter  launch --cwd=current
map ctrl+shift+plus   change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0
map f11           toggle_fullscreen
