# =============================================================================
# tmux — andusystems ricing
# Palette matches waybar: flat, monochrome, cyan accent (from hyprland border).
# =============================================================================

# -----------------------------------------------------------------------------
# Prefix — Alt+A
# -----------------------------------------------------------------------------
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# -----------------------------------------------------------------------------
# Indexing — start at 1, renumber when a window closes
# -----------------------------------------------------------------------------
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# -----------------------------------------------------------------------------
# General behavior
# -----------------------------------------------------------------------------
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on
set -g allow-rename off
setw -g automatic-rename off
setw -g aggressive-resize on
set -g display-time 2000
set -g display-panes-time 2000
set -g status-interval 1

# -----------------------------------------------------------------------------
# True color / italics
# -----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# -----------------------------------------------------------------------------
# Pane navigation (vim-style) and resizing (repeatable)
# -----------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# Copy mode — vi-style motions (default bindings otherwise)
# -----------------------------------------------------------------------------
setw -g mode-keys vi

# =============================================================================
# Theme — Kanagawa Wave
# =============================================================================
# Palette
#   bg        (transparent / terminal default = #141418)
#   fg        #dcd7ba
#   muted     #727169
#   subtle    #c8c093
#   separator #2a2a37
#   accent    #ff9e3b (surimi orange)
#   urgent    #ff5d62 (peach red)

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=#c8c093"

# Left: (empty)
set -g status-left-length 0
set -g status-left ""

# Right: pane command · clock
set -g status-right-length 100
set -g status-right "#[fg=#727169]#{pane_current_command} #[fg=#2a2a37]│#[fg=#dcd7ba] %A, %m-%d-%y — %-I:%M:%S %p "

# Window list — dots
set -g window-status-separator " "
set -g window-status-format "#[fg=#2a2a37]●"
set -g window-status-current-format "#[fg=#ff9e3b,bold]●"
set -g window-status-activity-style "fg=#ff5d62"
set -g window-status-bell-style "fg=#ff5d62,bold"

# Pane borders — heavy chars, accent when active
set -g pane-border-lines heavy
set -g pane-border-style "fg=#1f1f28"
set -g pane-active-border-style "fg=#b8722e"
set -g display-panes-colour "#727169"
set -g display-panes-active-colour "#ff9e3b"

# Dim inactive pane contents so the active one pops
set -g window-style "fg=#727169"
set -g window-active-style "fg=#dcd7ba"

# Command-line / message
set -g message-style "bg=default,fg=#ff9e3b"
set -g message-command-style "bg=default,fg=#ff9e3b"

# Copy-mode selection
set -g mode-style "bg=#ff9e3b,fg=#141418"

# Clock
set -g clock-mode-colour "#ff9e3b"
set -g clock-mode-style 24
