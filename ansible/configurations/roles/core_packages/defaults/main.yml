  - github-cli
  - rustup
  - brightnessctl
  - hyprsunset
  - rofi-wayland
  - qt5ct
  - qt6ct
  - xdg-desktop-portal-gtk
  - gnome-themes-extra
  - waybar
  - wl-gammarelay-rs
  - pavucontrol
