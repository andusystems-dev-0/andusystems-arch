- name: detect | Query PCI VGA/3D/Display controllers
  ansible.builtin.shell: lspci | grep -iE 'VGA|3D|Display'
  register: gpu_pci_output
  changed_when: false
  failed_when: false

- name: detect | Check for NVIDIA GPU
  ansible.builtin.set_fact:
    has_nvidia_gpu: "{{ 'NVIDIA' in gpu_pci_output.stdout }}"

- name: detect | Check for AMD GPU
  ansible.builtin.set_fact:
    has_amd_gpu: "{{ 'AMD' in gpu_pci_output.stdout or 'ATI' in gpu_pci_output.stdout }}"

- name: detect | Check for Intel GPU
  ansible.builtin.set_fact:
    has_intel_gpu: "{{ 'Intel' in gpu_pci_output.stdout }}"

- name: detect | Display detected GPUs
  ansible.builtin.debug:
    msg: >-
      GPU detection: NVIDIA={{ has_nvidia_gpu }}, AMD={{ has_amd_gpu }}, Intel={{ has_intel_gpu }}.
      Detected devices: {{ gpu_pci_output.stdout_lines | default([]) }}
