- name: intel | Enable multilib repository
  ansible.builtin.blockinfile:
    path: /etc/pacman.conf
    marker: "# {mark} ANSIBLE MANAGED MULTILIB"
    block: |
      [multilib]
      Include = /etc/pacman.d/mirrorlist
  become: true

- name: intel | Allow pacman without password
  ansible.builtin.copy:
    dest: /etc/sudoers.d/pacman-nopasswd
    content: "admin ALL=(ALL) NOPASSWD: /usr/bin/pacman\n"
    validate: visudo -cf %s
  become: true

- name: intel | Install Intel GPU packages via pacman
  ansible.builtin.command: pacman -S --noconfirm --needed {{ intel_packages | join(' ') }}
  become: true

- name: intel | Revoke passwordless pacman after install
  ansible.builtin.file:
    path: /etc/sudoers.d/pacman-nopasswd
    state: absent
  become: true
