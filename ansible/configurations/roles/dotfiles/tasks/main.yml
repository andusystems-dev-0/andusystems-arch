- name: dotfiles | Ensure dotfiles .config directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../../../dotfiles/home/.config"
    state: directory
    mode: '0755'

- name: dotfiles | Find unmanaged .config directories
  ansible.builtin.find:
    paths: "{{ ansible_facts['env']['HOME'] }}/.config"
    file_type: directory
    recurse: false
    follow: false
  register: config_dirs

- name: dotfiles | Adopt unmanaged configs into dotfiles repo
  ansible.builtin.shell: "mv '{{ item.path }}' '{{ playbook_dir }}/../../../dotfiles/home/.config/{{ item.path | basename }}'"
  loop: "{{ config_dirs.files }}"
  when:
    - not item.islnk
    - item.path | basename not in dotfiles_exclude

- name: dotfiles | Find dangling symlinks under .config
  ansible.builtin.shell: |
    set -o pipefail
    find "{{ ansible_facts['env']['HOME'] }}/.config" -maxdepth 1 -type l ! -exec test -e {} \; -print
  args:
    executable: /bin/bash
  register: dangling_config_links
  changed_when: false

- name: dotfiles | Prune dangling symlinks under .config
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ dangling_config_links.stdout_lines }}"
  when: item | basename not in dotfiles_exclude

- name: dotfiles | Stow home package
  ansible.builtin.shell: "stow --dir={{ playbook_dir }}/../../../dotfiles --target={{ ansible_facts['env']['HOME'] }} --restow home"

- name: dotfiles | Ensure local applications directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/share/applications"
    state: directory
    mode: '0755'

- name: dotfiles | Symlink nvim desktop entry
  ansible.builtin.file:
    src: "{{ playbook_dir }}/../../../dotfiles/home/.local/share/applications/nvim.desktop"
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/share/applications/nvim.desktop"
    state: link

- name: dotfiles | Symlink nvidia-settings desktop entry (hidden from launchers)
  ansible.builtin.file:
    src: "{{ playbook_dir }}/../../../dotfiles/home/.local/share/applications/nvidia-settings.desktop"
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/share/applications/nvidia-settings.desktop"
    state: link

- name: dotfiles | Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

- name: dotfiles | Enable waybar user service
  ansible.builtin.systemd:
    name: waybar.service
    enabled: true
    scope: user
